window.APP_POIS  = [{"lat": 52.041251, "lon": -9.5314697, "name": "Ross Castle", "type": "attraction", "dist": 62, "label": "Attrazione", "emoji": "\u2b50", "color": "#2196F3", "wiki": "en:Ross Castle", "web": "", "desc": "Ross Castle is a 15th-century tower house and keep on the edge of Lough Leane, in Killarney National Park, County Kerry, Ireland. It is the ancestral home of the Chiefs of the Clan O'Donoghue, later associated with the Brownes of Killarney."}, {"lat": 52.0370754, "lon": -9.5003842, "name": "McCarthy Mor Castle", "type": "historic", "dist": 391, "label": "Sito storico", "emoji": "\ud83c\udff0", "color": "#795548", "wiki": "", "web": "", "desc": "just parts of a ruin of an old castle, but nice looking  go to the \"lake side hotel\" parking place and follow the sign to the \"lake side walk\""}, {"lat": 52.0271178, "lon": -9.4880288, "name": "The Blue Pool", "type": "gallery", "dist": 505, "label": "Galleria d'arte", "emoji": "\ud83d\uddbc\ufe0f", "color": "#F44336", "wiki": "", "web": "", "desc": ""}, {"lat": 52.0261437, "lon": -9.4947858, "name": "Muckross Abbey", "type": "attraction", "dist": 132, "label": "Attrazione", "emoji": "\u2b50", "color": "#2196F3", "wiki": "en:Muckross Abbey", "web": "", "desc": "Muckross Abbey is a ruined Franciscan friary located in the Killarney National Park, County Kerry, Ireland. Previously known as the \"Friary of Irrelagh\", the abbey was founded in 1448 for the Observantine Franciscans by Donal McCarthy Mor. Today the abbey is largely roofless, but retains most of its original walls."}, {"lat": 52.019494, "lon": -9.5001392, "name": "Muckross Traditional Farm", "type": "attraction", "dist": 531, "label": "Attrazione", "emoji": "\u2b50", "color": "#2196F3", "wiki": "", "web": "", "desc": "Orari: Mo-Su 09:00-18:00 \u00b7 Biglietto: yes"}, {"lat": 52.0182387, "lon": -9.5040185, "name": "Muckross House", "type": "historic", "dist": 461, "label": "Sito storico", "emoji": "\ud83c\udff0", "color": "#795548", "wiki": "en:Muckross House", "web": "https://muckross-house.ie/", "desc": "Muckross House is located on the small Muckross Peninsula between Muckross Lake and Lough Leane, two of the lakes of Killarney, 6 kilometres (3.7\u00a0mi) from the town of Killarney in County Kerry, Ireland. In 1932 it was presented by William Bowers Bourn and Arthur Rose Vincent to the Irish nation. It thus became the first National Park in the Irish Free State and formed the basis of the present day Killarney National Park. The house now forms part of a visitor attraction marketed as Muckross House, Gardens and Traditional Farms."}, {"lat": 52.0091448, "lon": -9.5492249, "name": "Meeting of the waters", "type": "viewpoint", "dist": 80, "label": "Panoramico", "emoji": "\ud83c\udfd4\ufe0f", "color": "#FF6B35", "wiki": "", "web": "", "desc": ""}, {"lat": 52.0075535, "lon": -9.5494131, "name": "Droichead an tseanchora", "type": "attraction", "dist": 203, "label": "Attrazione", "emoji": "\u2b50", "color": "#2196F3", "wiki": "", "web": "", "desc": ""}, {"lat": 51.9981201, "lon": -9.5211161, "name": "Torc Mountain", "type": "viewpoint", "dist": 985, "label": "Panoramico", "emoji": "\ud83c\udfd4\ufe0f", "color": "#FF6B35", "wiki": "", "web": "", "desc": ""}, {"lat": 51.993333, "lon": -9.557222, "name": "Killarney National Park", "type": "attraction", "dist": 329, "label": "Attrazione", "emoji": "\u2b50", "color": "#2196F3", "wiki": "en:Killarney National Park", "web": "https://www.heritageireland.ie/en/South-West/KillarneyNationalPark/", "desc": "Killarney National Park, near the town of Killarney, County Kerry, was the first national park in Ireland, created when the Muckross Estate was donated to the Irish Free State in 1932. The park has since been substantially expanded and encompasses over 102.89\u00a0km2 of diverse ecology, including the Lakes of Killarney, oak and yew woodlands of international importance, and mountain peaks. It has the only red deer herd on mainland Ireland and the most extensive covering of native forest remaining in Ireland. The park is of high ecological value because of the quality, diversity, and extensiveness of many of its habitats and the wide variety of species that they accommodate, some of which are rare. The park was designated a UNESCO Biosphere Reserve in 1981. The park forms part of a Special Area of Conservation and a Special Protection Area."}, {"lat": 51.9876728, "lon": -9.5584602, "name": "Church ruins", "type": "historic", "dist": 12, "label": "Sito storico", "emoji": "\ud83c\udff0", "color": "#795548", "wiki": "", "web": "", "desc": "Ruins"}, {"lat": 51.9810515, "lon": -9.5739637, "name": "Newfoundland Bay Tunnel", "type": "attraction", "dist": 19, "label": "Attrazione", "emoji": "\u2b50", "color": "#2196F3", "wiki": "", "web": "", "desc": "Rock arch"}, {"lat": 51.9669149, "lon": -9.5810122, "name": "Waterfall view", "type": "viewpoint", "dist": 69, "label": "Panoramico", "emoji": "\ud83c\udfd4\ufe0f", "color": "#FF6B35", "wiki": "", "web": "", "desc": ""}, {"lat": 51.9643362, "lon": -9.5806591, "name": "Derrycunihy Roman Catholic Church", "type": "historic", "dist": 13, "label": "Sito storico", "emoji": "\ud83c\udff0", "color": "#795548", "wiki": "", "web": "", "desc": "Ruins"}, {"lat": 51.9650282, "lon": -9.591191, "name": "ruined castle", "type": "historic", "dist": 14, "label": "Sito storico", "emoji": "\ud83c\udff0", "color": "#795548", "wiki": "", "web": "", "desc": "ruined castle directly at the n71. there is a small parking place for three cars some meters away"}, {"lat": 51.9674501, "lon": -9.5928918, "name": "Ladies View", "type": "viewpoint", "dist": 14, "label": "Panoramico", "emoji": "\ud83c\udfd4\ufe0f", "color": "#FF6B35", "wiki": "", "web": "", "desc": ""}, {"lat": 51.968434, "lon": -9.5948687, "name": "Ladie's View", "type": "viewpoint", "dist": 64, "label": "Panoramico", "emoji": "\ud83c\udfd4\ufe0f", "color": "#FF6B35", "wiki": "", "web": "", "desc": ""}, {"lat": 51.9485954, "lon": -9.6324311, "name": "Kiss <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>

(function() {
  var TRACK = window.APP_TRACK;
  var POIS  = window.APP_POIS;
  var TYPES     = window.APP_TYPES;
  var NAV_URL   = window.NAV_URL;
  var NAV_LABEL = window.NAV_LABEL;
  var mapEl       = document.getElementById('map');
  var NEAR_M      = window.APP_NEAR;
  var nearActive  = false;
  var nearFilter  = null;
  var lastRenderLat = null;
  var lastRenderLon = null;

  var map = L.map("map", {zoomControl: true});
  map.setView([52.053256, -9.506552], 8);

  L.tileLayer(
    "https://{s}.tile-cyclosm.openstreetmap.fr/cyclosm/{z}/{x}/{y}.png",
    {
      attribution: "&copy; CyclOSM &copy; OpenStreetMap contributors",
      maxZoom: 20
    }
  ).addTo(map);

  L.polyline(TRACK, {color: "#e94560", weight: 3, opacity: 0.85}).addTo(map);

  var markers = [];
  var active  = {};
  Object.keys(TYPES).forEach(function(t) { active[t] = true; });

  function makeIcon(type) {
    var c = TYPES[type] || TYPES["attraction"];
    return L.divIcon({
      html: "<div style=\"background:" + c.color + ";width:26px;height:26px;"
          + "border-radius:50%;display:flex;align-items:center;justify-content:center;"
          + "font-size:13px;border:2px solid white;box-shadow:0 2px 5px rgba(0,0,0,0.35)\">"
          + c.emoji + "</div>",
      iconSize:   [26, 26],
      iconAnchor: [13, 13],
      className:  ""
    });
  }

  function makePopupHTML(p) {
    var s = "<b>" + p.emoji + " " + p.name + "</b>"
          + "<br><small style='color:#555'>" + p.label + "</small>"
          + "<br><small style='color:#2a9d8f'>" + p.dist + " m dal percorso</small>";
    if (p.wiki) {
      var wt = p.wiki.replace("it:", "");
      s += "<br><a href='https://it.wikipedia.org/wiki/" + encodeURIComponent(wt)
        +  "' target='_blank' style='font-size:0.8em'>Wikipedia</a>";
    }
    if (p.web) {
      s += "<br><a href='" + p.web + "' target='_blank' style='font-size:0.8em'>Sito web</a>";
    }
    return s;
  }

  var selectedRow = null;

  function selectPOI(row, m, p) {
    if (selectedRow) selectedRow.classList.remove("selected");
    selectedRow = row;
    row.classList.add("selected");
    row.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }

  function render() {
    markers.forEach(function(m) { m.remove(); });
    markers = [];
    selectedRow = null;
    var list    = document.getElementById("list");
    var counter = document.getElementById("vis-count");
    list.innerHTML = "";
    var visible = [];
    for (var i = 0; i < POIS.length; i++) {
      if (!active[POIS[i].type]) continue;
      if (nearFilter !== null) {
        var d = geoDistM(POIS[i].lat, POIS[i].lon, nearFilter.lat, nearFilter.lon);
        if (d > NEAR_M) continue;
      }
      visible.push(POIS[i]);
    }
    counter.textContent = visible.length;
    for (var j = 0; j < visible.length; j++) {
      (function(p) {
        var m = L.marker([p.lat, p.lon], {icon: makeIcon(p.type)})
                  .bindPopup(makePopupHTML(p))
                  .addTo(map);
        markers.push(m);

        var row  = document.createElement("div");  row.className  = "item";
        var ico  = document.createElement("div");  ico.className  = "ico";
        var body = document.createElement("div");  body.style.flex = "1"; body.style.minWidth = "0";
        var nm   = document.createElement("div");  nm.className   = "iname";
        var mt   = document.createElement("div");  mt.className   = "imeta";
        var ds   = document.createElement("div");  ds.className   = "idist";
        var dc   = document.createElement("div");  dc.className   = "idesc";

        var nav  = document.createElement("a");
        nav.className = "inav";
        nav.href   = NAV_URL(p);
        nav.target = "_blank";
        nav.title  = NAV_LABEL;
        nav.innerHTML = "&#x27A1;";
        nav.addEventListener("click", function(e) { e.stopPropagation(); });

        ico.textContent = p.emoji;
        nm.textContent  = p.name;
        mt.textContent  = p.label;
        ds.textContent  = p.dist + " m dal percorso";
        if (p.desc) dc.textContent = p.desc;
        body.appendChild(nm); body.appendChild(mt); body.appendChild(ds);
        if (p.desc) body.appendChild(dc);
        row.appendChild(ico); row.appendChild(body); row.appendChild(nav);

        m.on("click", function() {
          selectPOI(row, m, p);
        });

        row.addEventListener("click", function() {
          selectPOI(row, m, p);
          if (!mapEl.classList.contains("collapsed")) {
            map.setView([p.lat, p.lon], 16);
            m.openPopup();
          }
        });
        list.appendChild(row);
      })(visible[j]);
    }
  }

  var filterDiv = document.getElementById("filters");
  Object.keys(TYPES).forEach(function(type) {
    var cfg = TYPES[type];
    var btn = document.createElement("button");
    btn.className            = "fbtn";
    btn.style.borderColor    = cfg.color;
    btn.style.background     = cfg.color;
    btn.style.color          = "#111";
    btn.textContent          = cfg.emoji + " " + cfg.label;
    btn.addEventListener("click", function() {
      active[type]         = !active[type];
      btn.style.background = active[type] ? cfg.color : "transparent";
      btn.style.color      = active[type] ? "#111"    : "#eee";
      render();
    });
    filterDiv.appendChild(btn);
  });

  render();

  // Near — geolocation + proximity filter
  var locationMarker  = null;
  var locationCircle  = null;
  var locationWatcher = null;

  function geoDistM(lat1, lon1, lat2, lon2) {
    var R = 6371000;
    var dLat = (lat2 - lat1) * Math.PI / 180;
    var dLon = (lon2 - lon1) * Math.PI / 180;
    var a = Math.sin(dLat/2)*Math.sin(dLat/2)
          + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)
          * Math.sin(dLon/2)*Math.sin(dLon/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function updateLocationMarker(latlng, accuracy) {
    if (locationMarker) {
      locationMarker.setLatLng(latlng);
      locationCircle.setLatLng(latlng).setRadius(accuracy);
    } else {
      locationCircle = L.circle(latlng, {
        radius: accuracy, color: "#4ecca3", fillColor: "#4ecca3",
        fillOpacity: 0.15, weight: 1
      }).addTo(map);
      locationMarker = L.circleMarker(latlng, {
        radius: 7, color: "white", weight: 2,
        fillColor: "#4ecca3", fillOpacity: 1
      }).addTo(map);
    }
  }

  function applyNearFilter(lat, lon, panMap) {
    nearFilter = {lat: lat, lon: lon};
    lastRenderLat = lat;
    lastRenderLon = lon;
    render();
    if (panMap && !mapEl.classList.contains("collapsed")) {
      // Fit map to visible markers
      var bounds = [];
      markers.forEach(function(m) { bounds.push(m.getLatLng()); });
      if (bounds.length > 0) {
        map.fitBounds(L.latLngBounds(bounds), {padding: [30, 30]});
      } else {
        map.setView([lat, lon], map.getZoom());
      }
    }
  }

  var locBtn = document.getElementById("loc-btn");
  locBtn.addEventListener("click", function() {
    if (!navigator.geolocation) {
      alert("Geolocalizzazione non supportata da questo browser.");
      return;
    }
    if (nearActive) {
      // Deactivate
      if (locationWatcher !== null) { navigator.geolocation.clearWatch(locationWatcher); locationWatcher = null; }
      if (locationMarker)  { locationMarker.remove();  locationMarker  = null; }
      if (locationCircle)  { locationCircle.remove();  locationCircle  = null; }
      nearActive    = false;
      nearFilter    = null;
      lastRenderLat = null;
      lastRenderLon = null;
      locBtn.classList.remove("active");
      locBtn.title = "Filtra POI vicini";
      render();
    } else {
      // Activate — show full list until first fix
      nearActive = true;
      locBtn.classList.add("active");
      locBtn.title = "Disattiva filtro vicini";
      locationWatcher = navigator.geolocation.watchPosition(
        function(pos) {
          var lat = pos.coords.latitude;
          var lon = pos.coords.longitude;
          updateLocationMarker(L.latLng(lat, lon), pos.coords.accuracy);
          var isFirstFix = (lastRenderLat === null);
          if (isFirstFix) {
            // First fix: always apply filter + pan map
            applyNearFilter(lat, lon, true);
          } else {
            // Subsequent fixes: re-render only if moved > NEAR_M/10
            var moved = geoDistM(lat, lon, lastRenderLat, lastRenderLon);
            if (moved > NEAR_M / 10) {
              applyNearFilter(lat, lon, false);
            } else {
              // Just update marker position, no re-render
              updateLocationMarker(L.latLng(lat, lon), pos.coords.accuracy);
            }
          }
        },
        function(err) {
          nearActive = false;
          locBtn.classList.remove("active");
          var errMsg = err.message || "";
          var errCodes = {1:"Permesso negato (abilita la localizzazione in Impostazioni \u2192 Privacy \u2192 Siti web di Safari)",
                          2:"Posizione non disponibile", 3:"Timeout"};
          alert("Errore geolocalizzazione: " + (errCodes[err.code] || errMsg || "codice " + err.code));
        },
        { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
      );
    }
  });

  // Map toggle (mobile only)
  var toggleBtn = document.getElementById('map-toggle');
  var mapVisible = true;
  toggleBtn.addEventListener('click', function() {
    mapVisible = !mapVisible;
    if (mapVisible) {
      mapEl.classList.remove('collapsed');
      toggleBtn.setAttribute('title', 'Nascondi mappa');
      toggleBtn.innerHTML = '&#x25B2;Mappa';
      setTimeout(function() {
        map.invalidateSize();
        if (selectedRow) selectedRow.scrollIntoView({ behavior: "smooth", block: "nearest" });
      }, 310);
    } else {
      mapEl.classList.add('collapsed');
      toggleBtn.setAttribute('title', 'Mostra mappa');
      toggleBtn.innerHTML = '&#x25BC;Mappa';
    }
  });
})();

</script>
</body>
</html>
