"color": "#2196F3", "wiki": "en:Muckross Abbey", "web": "", "desc": "Muckross Abbey is a ruined Franciscan friary located in the Killarney National Park, County Kerry, Ireland. Previously known as the \"Friary of Irrelagh\", the abbey was founded in 1448 for the Observantine Franciscans by Donal McCarthy Mor. Today the abbey is largely roofless, but retains most of its original walls.", "phone": "", "hours": ""}, {"lat": 52.019494, "lon": -9.5001392, "name": "Muckross Traditional Farm", "type": "attraction", "dist": 531, "label": "Attrazione", "emoji": "\u2b50", "color": "#2196F3", "wiki": "", "web": "", "desc": "Orari: Mo-Su 09:00-18:00 \u00b7 Biglietto: yes", "phone": "", "hours": "Mo-Su 09:00-18:00"}, {"lat": 52.0182387, "lon": -9.5040185, "name": "Muckross House", "type": "historic", "dist": 461, "label": "Sito storico", "emoji": "\ud83c\udff0", "color": "#795548", "wiki": "en:Muckross House", "web": "https://muckross-house.ie/", "desc": "Muckross House is located on the small Muckross Peninsula between Muckross Lake and Lough Leane, two of the lakes of Killarney, 6 kilometres (3.7\u00a0mi) from the town of Killarney in County Kerry, Ireland. In 1932 it was presented by William Bowers Bourn and Arthur Rose Vincent to the Irish nation. It thus became the first National Park in the Irish Free State and formed the basis of the present day Killarney National Park. The house now forms part of a visitor attraction marketed as Muckross House, Gardens and Traditional Farms.", "phone": "+353 64 6670144", "hours": ""}, {"lat": 52.0091448, "lon": -9.5492249, "name": "Meeting of the waters", "type": "viewpoint", "dist": 80, "label": "Panoramico", "emoji": "\ud83c\udfd4\ufe0f", "color": "#FF6B35", "wiki": "", "web": "", "desc": "", "phone": "", "hours": ""}, {"lat": 52.0075535, "lon": -9.5494131, "name": "Droichead an tseanchora", "type": "attraction", "dist": 203, "label": "Attrazione", "emoji": "\u2b50", "color": "#2196F3", "wiki": "", "web": "", "desc": "", "phone": "", "hours": ""}, {"lat": 51.9981201, "lon": -9.5211161, "name": "Torc Mountain", "type": "viewpoint", "dist": 985, "label": "Panoramico", "emoji": "\ud83c\udfd4\ufe0f", "color": "#FF6B35", "wiki": "", "web": "", "desc": "", "phone": "", "hours": ""}, {"lat": 51.993333, "lon": -9.557222, "name": "Killarney National Park", "type": "attraction", "dist": 329, "label": "Attrazione", "emoji": "\u2b50", "color": "#2196F3", "wiki": "en:Killarney National Park", "web": "https://www.heritageireland.ie/en/South-West/KillarneyNationalPark/", "desc": "Killarney National Park, near the town of Killarney, County Kerry, was the first national park in Ireland, created when the Muckross Estate was donated to the Irish Free State in 1932. The park has since been substantially expanded and encompasses over 102.89\u00a0km2 of diverse ecology, including the Lakes of Killarney, oak and yew woodlands of international importance, and mountain peaks. It has the only red deer herd on mainland Ireland and the most extensive covering of native forest remaining in Ireland. The park is of high ecological value because of the quality, diversity, and extensiveness of many of its habitats and the wide variety of species that they accommodate, some of which are rare. The park was designated a UNESCO Biosphere Reserve in 1981. The park forms part of a Special Area of Conservation and a Special Protection Area.", "phone": "", "hours": ""}, {"lat": 51.9876728, "lon": -9.5584602, "name": "Church ruins", "type": "historic", "dist": 12, "label": "Sito storico", "emoji": "\ud83c\udff0", "color": "#795548", "wiki": "", "web": "", "desc": "Ruins", "phone": "", "hours": ""}, {"lat": 51.9810515, "lon": -9.5739637, "name": "Newfoundland Bay Tunnel", "type": "attraction", "dist": 19, "label": "Attrazione", "emoji": "\u2b50", "color": "#2196F3", "wiki": "", "web": "", "desc": "Rock arch", "phone": "", "hours": ""}, {"lat": 51.9669149, "lon": -9.5810122, "name": "Waterfall view", "type": "viewpoint", "dist": 69, "label   function geoDistM(lat1, lon1, lat2, lon2) {
    var R = 6371000;
    var dLat = (lat2 - lat1) * Math.PI / 180;
    var dLon = (lon2 - lon1) * Math.PI / 180;
    var a = Math.sin(dLat/2)*Math.sin(dLat/2)
          + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)
          * Math.sin(dLon/2)*Math.sin(dLon/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

          map.setView([lat, lon], 16);
          m.openPopup();
        }
      });
      m.on("click", function() {
        document.querySelectorAll(".food-item.selected").forEach(function(r){ r.classList.remove("selected"); });
        row.classList.add("selected");
        row.scrollIntoView({ behavior: "smooth", block: "nearest" });
      });

      sec.appendChild(row);
    });

    document.getElementById("list").appendChild(sec);
    // Zoom sui POIFood
    zoomOnFood();
  }

  function buildOverpassQuery(lat, lon, r) {
    return '[out:json][timeout:15];'
         + '('
         + 'node[amenity~"^(restaurant|bar|cafe|fast_food)$"](around:' + r + ',' + lat + ',' + lon + ');'
         + 'node[shop~"^(supermarket|convenience|bakery)$"](around:'  + r + ',' + lat + ',' + lon + ');'
         + 'way[amenity~"^(restaurant|bar|cafe|fast_food)$"](around:'  + r + ',' + lat + ',' + lon + ');'
         + 'way[shop~"^(supermarket|convenience|bakery)$"](around:'    + r + ',' + lat + ',' + lon + ');'
         + ');'
         + 'out center tags;';
  }

  function processOverpassResult(data, lat, lon) {
    var els = (data.elements || []).filter(function(e) {
      return e.tags && e.tags.name;
    });
    els.sort(function(a, b) {
      var aLat = a.lat||(a.center&&a.center.lat)||lat;
      var aLon = a.lon||(a.center&&a.center.lon)||lon;
      var bLat = b.lat||(b.center&&b.center.lat)||lat;
      var bLon = b.lon||(b.center&&b.center.lon)||lon;
      return geoDistM(lat,lon,aLat,aLon) - geoDistM(lat,lon,bLat,bLon);
    });
    return els;
  }

  function queryFood(lat, lon) {
    foodBtn.textContent = "…";
    foodBtn.disabled = true;
    foodRadiusUsed = FOOD_RADIUS;

    fetch("https://overpass-api.de/api/interpreter", {
      method: "POST",
      body: "data=" + encodeURIComponent(buildOverpassQuery(lat, lon, FOOD_RADIUS))
    })
    .then(function(resp) {
      if (!resp.ok) throw new Error("HTTP " + resp.status);
      return resp.json();
    })
    .then(function(data) {
      if (data.elements === undefined) throw new Error("risposta non valida");
      if (data.remark && /error|timeout|exceeded/i.test(data.remark)) throw new Error("Overpass: " + data.remark);
      foodQueryLat = lat; foodQueryLon = lon;
      renderFoodSection(processOverpassResult(data, lat, lon));
      foodBtn.innerHTML = "<span class='btn-ico'><svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 53.6621 95.2637' width='18' height='18' fill='currentColor'><path d='M13.4521 89.3555C16.7724 89.3555 18.7256 87.5 18.6767 84.3262L17.9443 41.2109C17.9443 39.8438 18.5791 38.8184 19.751 38.2812C24.8291 36.084 27.1728 33.7891 26.8799 27.002L25.8056 3.27148C25.708 1.5625 24.7314 0.537109 23.1201 0.537109C21.5576 0.537109 20.6299 1.61133 20.6299 3.32031L20.9228 26.416C20.9228 27.7344 20.0439 28.6133 18.7256 28.6133C17.4072 28.6133 16.4795 27.7832 16.4795 26.5137L16.0888 2.63672C16.04 0.976562 15.0635 0 13.4521 0C11.8896 0 10.9131 0.976562 10.8642 2.63672L10.4736 26.5137C10.4736 27.7832 9.54587 28.6133 8.17869 28.6133C6.90915 28.6133 6.03025 27.7344 6.03025 26.416L6.27439 3.32031C6.27439 1.61133 5.39548 0.537109 3.83298 0.537109C2.22165 0.537109 1.19626 1.5625 1.09861 3.27148L0.024389 27.002C-0.26858 33.7891 2.07517 36.084 7.20212 38.2812C8.374 38.8184 9.00876 39.8438 9.00876 41.2109L8.27634 84.3262C8.22751 87.5 10.1806 89.3555 13.4521 89.3555ZM43.9209 55.2246L43.1885 84.2773C43.0908 87.5 45.0927 89.3555 48.3642 89.3555C51.6845 89.3555 53.6377 87.6953 53.6377 84.6191L53.6377 2.97852C53.6377 0.927734 52.2217 0 50.7568 0C49.292 0 48.3154 0.78125 46.9482 2.68555C40.7959 11.377 36.6455 27.8809 36.6455 42.9688L36.6455 44.6289C36.6455 47.168 37.6709 49.1699 39.5752 50.4395L42.0166 52.0508C43.3349 52.9785 43.9697 54.0039 43.9209 55.2246Z'/></svg></span><span class='btn-lbl'>Food</span>";
      foodBtn.disabled = false;
    })
    .catch(function() {
      foodBtn.innerHTML = "<span class='btn-ico'><svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 53.6621 95.2637' width='18' height='18' fill='currentColor'><path d='M13.4521 89.3555C16.7724 89.3555 18.7256 87.5 18.6767 84.3262L17.9443 41.2109C17.9443 39.8438 18.5791 38.8184 19.751 38.2812C24.8291 36.084 27.1728 33.7891 26.8799 27.002L25.8056 3.27148C25.708 1.5625 24.7314 0.537109 23.1201 0.537109C21.5576 0.537109 20.6299 1.61133 20.6299 3.32031L20.9228 26.416C20.9228 27.7344 20.0439 28.6133 18.7256 28.6133C17.4072 28.6133 16.4795 27.7832 16.4795 26.5137L16.0888 2.63672C16.04 0.976562 15.0635 0 13.4521 0C11.8896 0 10.9131 0.976562 10.8642 2.63672L10.4736 26.5137C10.4736 27.7832 9.54587 28.6133 8.17869 28.6133C6.90915 28.6133 6.03025 27.7344 6.03025 26.416L6.27439 3.32031C6.27439 1.61133 5.39548 0.537109 3.83298 0.537109C2.22165 0.537109 1.19626 1.5625 1.09861 3.27148L0.024389 27.002C-0.26858 33.7891 2.07517 36.084 7.20212 38.2812C8.374 38.8184 9.00876 39.8438 9.00876 41.2109L8.27634 84.3262C8.22751 87.5 10.1806 89.3555 13.4521 89.3555ZM43.9209 55.2246L43.1885 84.2773C43.0908 87.5 45.0927 89.3555 48.3642 89.3555C51.6845 89.3555 53.6377 87.6953 53.6377 84.6191L53.6377 2.97852C53.6377 0.927734 52.2217 0 50.7568 0C49.292 0 48.3154 0.78125 46.9482 2.68555C40.7959 11.377 36.6455 27.8809 36.6455 42.9688L36.6455 44.6289C36.6455 47.168 37.6709 49.1699 39.5752 50.4395L42.0166 52.0508C43.3349 52.9785 43.9697 54.0039 43.9209 55.2246Z'/></svg></span><span class='btn-lbl'>Food</span>";
      foodBtn.disabled = false;
      foodActive = false;
      foodBtn.classList.remove("active");
      clearFood();
      exitFoodMode();
      alert("Ricerca locali non disponibile. Controlla la connessione.");
    });
  }

  foodBtn.addEventListener("click", function() {
    if (foodActive) {
      foodActive = false;
      foodBtn.classList.remove("active");
      clearFood();
      exitFoodMode();
      return;
    }
    if (!navigator.geolocation) {
      alert("Geolocalizzazione non supportata da questo browser.");
      return;
    }
    navigator.geolocation.getCurrentPosition(
      function(pos) {
        foodLat = pos.coords.latitude;
        foodLon = pos.coords.longitude;
        foodActive = true;
        foodBtn.classList.add("active");
        updateLocationMarker(L.latLng(foodLat, foodLon), pos.coords.accuracy);
        // Riusa cache se posizione entro FOOD_RADIUS/5 dalla query precedente
        var reuse = foodQueryLat !== null && foodElements.length > 0
                 && geoDistM(foodLat, foodLon, foodQueryLat, foodQueryLon) <= FOOD_RADIUS / 5;
        if (reuse) {
          enterFoodMode();
          renderFoodSection(foodElements);
        } else {
          foodRadiusUsed = FOOD_RADIUS;
          enterFoodMode();
          queryFood(foodLat, foodLon);
        }
      },
      function(err) {
        var errCodes = {1:"Permesso negato", 2:"Posizione non disponibile", 3:"Timeout"};
        alert("Errore geolocalizzazione: " + (errCodes[err.code] || err.message));
      },
      { enableHighAccuracy: true, timeout: 10000 }
    );
  });

  // Map toggle (mobile only)
  var toggleBtn = document.getElementById('map-toggle');
  var mapVisible = true;
  toggleBtn.classList.add('active');
  toggleBtn.addEventListener('click', function() {
    mapVisible = !mapVisible;
    if (mapVisible) {
      mapEl.classList.remove('collapsed');
      toggleBtn.classList.add('active');
      setTimeout(function() {
        map.invalidateSize();
        if (selectedRow) selectedRow.scrollIntoView({ behavior: "smooth", block: "nearest" });
      }, 310);
    } else {
      mapEl.classList.add('collapsed');
      toggleBtn.classList.remove('active');
    }
  });
})();

</script>
