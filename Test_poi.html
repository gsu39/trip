<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POI Puglia-Matera (4 punti)</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
       background: #1a1a2e; color: #eee; display: flex; flex-direction: row; overflow: hidden; }
#sidebar { width: 300px; flex-shrink: 0; background: #16213e; display: flex;
           flex-direction: column; overflow: hidden; border-right: 1px solid #0f3460; }
#map { flex: 1; min-width: 0; min-height: 0; }
#map-toggle { display: none; background: #0f3460; border: 1px solid #4ecca3;
  color: #4ecca3; padding: 4px 8px; font-size: 0.72rem; cursor: pointer;
  -webkit-appearance: none; appearance: none; border-radius: 4px;
  white-space: nowrap; flex-shrink: 0; }
.hdr { padding: 12px 14px; background: #0f3460; flex-shrink: 0; }
.hdr h1 { font-size: 0.95rem; color: #e94560; }
.hdr p  { font-size: 0.72rem; color: #aaa; margin-top: 3px; }
.stats { padding: 8px 12px; border-bottom: 1px solid #0f3460; flex-shrink: 0;
         display: flex; gap: 6px; }
.stat  { background: #0f3460; border-radius: 5px; padding: 6px 8px;
         text-align: center; flex: 1; }
.stat .v { font-size: 0.95rem; font-weight: 700; color: #4ecca3; }
.stat .l { font-size: 0.62rem; color: #888; }
.filters { padding: 8px 12px; border-bottom: 1px solid #0f3460; flex-shrink: 0;
           display: flex; flex-wrap: wrap; gap: 5px; }
.fbtn { padding: 4px 9px; border-radius: 20px; border: 1px solid;
        font-size: 0.7rem; cursor: pointer; appearance: none; -webkit-appearance: none; }
#list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.item { padding: 10px 12px; border-bottom: 1px solid #0f3460; cursor: pointer;
        display: flex; gap: 8px; align-items: flex-start; }
.ico   { font-size: 1.1rem; flex-shrink: 0; }
.iname { font-size: 0.78rem; font-weight: 600; line-height: 1.3; }
.imeta { font-size: 0.67rem; color: #888; }
.idist { font-size: 0.67rem; color: #4ecca3; }
@media (max-width: 600px) {
  body { flex-direction: column; }
  #sidebar { width: 100%; flex: 1; min-height: 0; border-right: none; border-bottom: 1px solid #0f3460; display: flex; flex-direction: column; }
  #list { flex: 1; min-height: 0; }
  #map { height: 50vh; flex: none; transition: height 0.3s ease; }
  #map.collapsed { height: 0 !important; min-height: 0; overflow: hidden; }
  #map-toggle { display: inline-block; }
  .hdr { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
}
</style>
</head>
<body>
<div id="sidebar">
  <div class="hdr">
    <div>
      <h1>&#x1F6B4; POI Puglia &middot; Matera</h1>
      <p>Generato il 07/03/2026 15:26 &middot; entro 1 km</p>
    </div>
    <button id="map-toggle" title="Nascondi mappa">&#x25B2;Mappa</button>
  </div>
  <div class="stats">
    <div class="stat"><div class="v">4</div><div class="l">POI</div></div>
    <div class="stat"><div class="v" id="vis-count">4</div><div class="l">Visibili</div></div>
    <div class="stat"><div class="v">22</div><div class="l">Km</div></div>
  </div>
  <div class="filters" id="filters"></div>
  <div id="list"></div>
</div>
<div id="map"></div>

window.APP_POIS  = [{"lat": 43.6892915, "lon": 11.1229413, "name": "Villa Il Castellare", "type": "historic", "dist": 66, "label": "Sito storico", "emoji": "\ud83c\udff0", "color": "#795548", "wiki": "", "web": ""}, {"lat": 43.7161092, "lon": 11.1655015, "name": "Parco Museo di Poggio Valicaia", "type": "museum", "dist": 26, "label": "Museo", "emoji": "\ud83c\udfdb\ufe0f", "color": "#9B59B6", "wiki": "", "web": ""}, {"lat": 43.7101418, "lon": 11.1891267, "name": "Villa Treggiaia", "type": "historic", "dist": 31, "label": "Sito storico", "emoji": "\ud83c\udff0", "color": "#795548", "wiki": "", "web": ""}, {"lat": 43.7197154, "lon": 11.1950283, "name": "Villa I Collazzi", "type": "historic", "dist": 662, "label": "Sito storico", "emoji": "\ud83c\udff0", "color": "#795548", "wiki": "it:Villa I Collazzi", "web": ""}];
window.APP_TYPES = {"viewpoint": {"emoji": "\ud83c\udfd4\ufe0f", "label": "Panoramico", "color": "#FF6B35"}, "museum": {"emoji": "\ud83c\udfdb\ufe0f", "label": "Museo", "color": "#9B59B6"}, "gallery": {"emoji": "\ud83d\uddbc\ufe0f", "label": "Galleria d'arte", "color": "#F44336"}, "artwork": {"emoji": "\ud83c\udfa8", "label": "Arte/Monumento", "color": "#E91E63"}, "attraction": {"emoji": "\u2b50", "label": "Attrazione", "color": "#2196F3"}, "historic": {"emoji": "\ud83c\udff0", "label": "Sito storico", "color": "#795548"}};

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>

(function() {
  var TRACK = window.APP_TRACK;
  var POIS  = window.APP_POIS;
  var TYPES = window.APP_TYPES;

  var map = L.map("map", {zoomControl: true});
  map.setView([43.676808, 11.150742], 8);

  L.tileLayer(
    "https://{s}.tile-cyclosm.openstreetmap.fr/cyclosm/{z}/{x}/{y}.png",
    {
      attribution: "&copy; CyclOSM &copy; OpenStreetMap contributors",
      maxZoom: 20
    }
  ).addTo(map);

  L.polyline(TRACK, {color: "#e94560", weight: 3, opacity: 0.85}).addTo(map);

  var markers = [];
  var active  = {};
  Object.keys(TYPES).forEach(function(t) { active[t] = true; });

  function makeIcon(type) {
    var c = TYPES[type] || TYPES["attraction"];
    return L.divIcon({
      html: "<div style=\"background:" + c.color + ";width:26px;height:26px;"
          + "border-radius:50%;display:flex;align-items:center;justify-content:center;"
          + "font-size:13px;border:2px solid white;box-shadow:0 2px 5px rgba(0,0,0,0.35)\">"
          + c.emoji + "</div>",
      iconSize:   [26, 26],
      iconAnchor: [13, 13],
      className:  ""
    });
  }

  function makePopupHTML(p) {
    var s = "<b>" + p.emoji + " " + p.name + "</b>"
          + "<br><small style='color:#555'>" + p.label + "</small>"
          + "<br><small style='color:#2a9d8f'>" + p.dist + " m dal percorso</small>";
    if (p.wiki) {
      var wt = p.wiki.replace("it:", "");
      s += "<br><a href='https://it.wikipedia.org/wiki/" + encodeURIComponent(wt)
        +  "' target='_blank' style='font-size:0.8em'>Wikipedia</a>";
    }
    if (p.web) {
      s += "<br><a href='" + p.web + "' target='_blank' style='font-size:0.8em'>Sito web</a>";
    }
    return s;
  }

  function render() {
    markers.forEach(function(m) { m.remove(); });
    markers = [];
    var list    = document.getElementById("list");
    var counter = document.getElementById("vis-count");
    list.innerHTML = "";
    var visible = [];
    for (var i = 0; i < POIS.length; i++) {
      if (active[POIS[i].type]) visible.push(POIS[i]);
    }
    counter.textContent = visible.length;
    for (var j = 0; j < visible.length; j++) {
      (function(p) {
        var m = L.marker([p.lat, p.lon], {icon: makeIcon(p.type)})
                  .bindPopup(makePopupHTML(p))
                  .addTo(map);
        markers.push(m);
        var row  = document.createElement("div");  row.className  = "item";
        var ico  = document.createElement("div");  ico.className  = "ico";
        var body = document.createElement("div");
        var nm   = document.createElement("div");  nm.className   = "iname";
        var mt   = document.createElement("div");  mt.className   = "imeta";
        var ds   = document.createElement("div");  ds.className   = "idist";
        ico.textContent = p.emoji;
        nm.textContent  = p.name;
        mt.textContent  = p.label;
        ds.textContent  = p.dist + " m dal percorso";
        body.appendChild(nm); body.appendChild(mt); body.appendChild(ds);
        row.appendChild(ico); row.appendChild(body);
        row.addEventListener("click", function() {
          map.setView([p.lat, p.lon], 16);
          m.openPopup();
        });
        list.appendChild(row);
      })(visible[j]);
    }
  }

  var filterDiv = document.getElementById("filters");
  Object.keys(TYPES).forEach(function(type) {
    var cfg = TYPES[type];
    var btn = document.createElement("button");
    btn.className            = "fbtn";
    btn.style.borderColor    = cfg.color;
    btn.style.background     = cfg.color;
    btn.style.color          = "#111";
    btn.textContent          = cfg.emoji + " " + cfg.label;
    btn.addEventListener("click", function() {
      active[type]         = !active[type];
      btn.style.background = active[type] ? cfg.color : "transparent";
      btn.style.color      = active[type] ? "#111"    : "#eee";
      render();
    });
    filterDiv.appendChild(btn);
  });

  render();

  // Map toggle — only active on mobile (button visible via CSS media query)
  var mapEl     = document.getElementById('map');
  var toggleBtn = document.getElementById('map-toggle');
  var mapVisible = true;
  toggleBtn.addEventListener('click', function() {
    mapVisible = !mapVisible;
    if (mapVisible) {
      mapEl.classList.remove('collapsed');
      toggleBtn.setAttribute('title', 'Nascondi mappa');
      toggleBtn.innerHTML = '&#x25B2;Mappa';
      setTimeout(function() { map.invalidateSize(); }, 310);
    } else {
      mapEl.classList.add('collapsed');
      toggleBtn.setAttribute('title', 'Mostra mappa');
      toggleBtn.innerHTML = '&#x25BC;Mappa';
    }
  });
})();

</script>
</body>
</html>
