nell'ambito delle mura cinquecentesche di Padova, realizzate dalla Repubblica Serenissima.", "phone": "", "hours": ""}, {"lat": 45.408963, "lon": 11.8782958, "name": "Porta Altinate", "type": "historic", "dist": 2, "label": "Sito storico", "emoji": "\ud83c\udff0", "color": "#795548", "wiki": "it:Porta Altinate", "web": "", "desc": "La Porta Altinate o Porta di Ponte Altin\u00e0 era uno dei quattro accessi \"regales\" che si aprivano sulle mura comunali di Padova. La porta si innalza sulla prima pila del romano Ponte Altinate - ora non visibile - che attraversa il Naviglio Interno interrato negli anni sessanta dello scorso secolo per lasciare spazio alla via Riviera dei Ponti Romani. La porta e il ponte - come pure la seguente contrada - traggono il nome da Altino, la citt\u00e0 verso cui si dirigeva la strada a cui davano accesso. La porta \u00e8 un frequentato passaggio pedonale verso la piazza dei Noli, ora Garibaldi.", "phone": "", "hours": ""}, {"lat": 45.4113295, "lon": 11.8737613, "name": "Porta di Ponte Molino", "type": "historic", "dist": 409, "label": "Sito storico", "emoji": "\ud83c\udff0", "color": "#795548", "wiki": "it:Porta Molino", "web": "", "desc": "La Porta Molino o Porta dei Molini era il principale dei quattro accessi regales che si aprivano nella cinta muraria medievale di Padova. Affacciata verso settentrione, si innalza al termine del romano Ponte Molino che attraversa il ramo del Bacchiglione chiamato Tronco Maestro dove sino 1884 funzionarono trentatr\u00e9 ruote di altrettanti mulini montati su barche, da cui la porta ed il ponte traggono il nome.", "phone": "", "hours": ""}, {"lat": 45.4081476, "lon": 11.8776999, "name": "Galleria Cavour", "type": "gallery", "dist": 26, "label": "Galleria d'arte", "emoji": "\ud83d\uddbc\ufe0f", "color": "#F44336", "wiki": "", "web": "", "desc": "", "phone": "", "hours": ""}, {"lat": 45.4076922, "lon": 11.8770946, "name": "Caff\u00e9 Pedrocchi", "type": "attraction", "dist": 36, "label": "Attrazione", "emoji": "\u2b50", "color": "#2196F3", "wiki": "it:Caff\u00e8 Pedrocchi", "web": "", "desc": "Il Caff\u00e8 Pedrocchi, situato nel centro di Padova, in via VIII Febbraio n\u00ba 15, \u00e8 un caff\u00e8 storico di fama internazionale. Aperto giorno e notte fino al 1916 e perci\u00f2 noto anche come il \"Caff\u00e8 senza porte\", per oltre un secolo \u00e8 stato un prestigioso punto d'incontro frequentato da intellettuali, studenti, accademici e uomini politici.", "phone": "+39 049 8781231", "hours": ""}, {"lat": 45.4107674, "lon": 11.8734919, "name": "Black Light Gallery", "type": "gallery", "dist": 369, "label": "Galleria d'arte", "emoji": "\ud83d\uddbc\ufe0f", "color": "#F44336", "wiki": "", "web": "", "desc": "Orari: Tu-Sa 10:00-13:00, 15:30-19:30", "phone": "", "hours": "Tu-Sa 10:00-13:00, 15:30-19:30"}, {"lat": 45.408918, "lon": 11.8750757, "name": "Oratorio San Rocco", "type": "museum", "dist": 130, "label": "Museo", "emoji": "\ud83c\udfdb\ufe0f", "color": "#9B59B6", "wiki": "it:Scuola di San Rocco (Padova)", "web": "", "desc": "La Scuola di San Rocco o Oratorio di San Rocco \u00e8 un edificio di origine medievale utilizzato sino al 1810 per scopi religiosi. Si affaccia sul sagrato della chiesa di Santa Lucia a Padova. Vi aveva sede la Fraglia di San Rocco che la realizz\u00f2 tra il 1525 e il 1542 su precedenti edifici. Ora \u00e8 struttura di propriet\u00e0 comunale.", "phone": "", "hours": "Tu-Su 09:30-12:30, 15:30-19:00"}, {"lat": 45.4071317, "lon": 11.8756519, "name": "Pendolo di Foucault", "type": "attraction", "dist": 25, "label": "Attrazione", "emoji": "\u2b50", "color": "#2196F3", "wiki": "", "web": "", "desc": "Orari: Tu-Su 09:00-18:00", "phone": "", "hours": "Tu-Su 09:00-18:00"}, {"lat": 45.4072462, "lon": 11.875262, "name": "Sotterranei del Palazzo della Ragione", "type": "attraction", "dist": 2, "label": "Attrazione", "emoji": "\u2b50", "color": "#2196F3", "wiki": "", "web": "", "desc": "this indicates the entrance to the archeological site", "phone": "+49 049 8364363", "hours": ""}, {"lat": 45.4072648, "lon": 11.8752291, "name": "Palazzo della Ragione", "type": "museum", "dist": 4, "label": "Museo", "emoji": "\ud83c\udfdb\ufe0f", "color": "#9B59B6", "wiki": "it:Palazzo della Ragione (Padova)", "web": "https://padovacultura.padovanet.it/it/musei/palazzo-della-ragione", "desc": "Il Palazzo della Ragione era l'antica sede dei tribunali cittadini e del mercato coperto di Padova. La parte inferiore era gi\u00e0 esistente nel 1166, ma si stima che sia stato eretto tra il 1218 e il 1219, e tra il 1306 e il 1309 Giovanni degli Eremitani fece aggiungere il porticato e le logge e fece innalzare la copertura a cui diede la caratteristica forma di carena di nave rovesciata. Il piano superiore \u00e8 occupato da quella che \u00e8 stata la pi\u00f9 grande sala pensile del mondo, detta \"Salone\", che misura circa 80 metri per 27 e ha un'altezza di quasi 40 metri, con soffitto ligneo a carena di nave. Il piano inferiore ospita invece lo storico mercato coperto della citt\u00e0. Il palazzo fa parte dei musei civici di Padova. Grazie agli affreschi presenti nel Salone, realizzati in origine da Giotto e rifatti dopo l'incendio del 1420, nel 2021 \u00e8 stato incluso dall'UNESCO tra i patrimoni dell'umanit\u00e0 nel sito dei cicli di affreschi del XIV secolo di Padova.", "phone": "", "hours": ""}, {"lat": 45.407744, "lon": 11.872787, "name": "Torre dell'Orologio", "type": "attraction", "dist": 65, "label": "Attrazione", "emoji": "\u2b50", "color": "#2196F3", "wiki": "it:Torre dell'Orologio (Padova)", "web": "", "desc": "La Torre dell'Orologio \u00e8 un edificio di origine medievale che si affaccia su Piazza dei Signori a Padova. Si erge tra il Palazzo del Capitanio e il Palazzo dei Camerlenghi.", "phone": "", "hours": ""}, {"lat": 45.4080088, "lon": 11.8714393, "name": "Museo di Scienze Archeologiche e d'Arte", "type": "museum", "dist": 142, "label": "Museo", "emoji": "\ud83c\udfdb\ufe0f", "color": "#9B59B6", "wiki": "", "web": "", "desc": "Gestito da: Universit\u00e0 degli Studi di Padova", "phone": "", "hours": ""}, {"lat": 45.4086099, "lon": 11.8722382, "name": "Galleria Daniele", "type": "gallery", "dist": 167, "label": "Galleria d'arte", "emoji": "\ud83d\uddbc\ufe0f", "color": "#F44336", "wiki": "", "web": "", "desc": "Orari: Tu-Fr 10:00-13:00, 16:00-19:30 \u00b7 Biglietto: gratuito", "phone": "", "hours": "Tu-Fr 10:00-13:00, 16:00-19:30"}, {"lat": 45.4074363, "lon": 11.8730143, "name": "Loggia della Gran Guardia", "type": "attraction", "dist": 35, "label": "Attrazione", "emoji": "\u2b50", "color": "#2196F3", "wiki": "it:Loggia della Gran Guardia", "web": "", "desc": "La Loggia del Consiglio, conosciuta anche come Loggia della Gran Guardia, \u00e8 un edificio rinascimentale che si affaccia su Piazza dei Signori a Padova. Fu realizzata a partire dal 1491 come sede del Gran Consiglio. Sorse su un progetto presentato da Annibale Maggi e la fabbrica si concluse nel 1536, secondo alcuni studi, a direzione di Giovanni Maria Falconetto. La sala superiore fu affrescata nel 1667 da Pier Antonio Torri. Durante la dominazione austriaca divenne sede della \"Gran Guardia\", comando militare della citt\u00e0.", "phone": "", "hours": ""}, {"lat": 45.4070014, "lon": 11.8723705, "name": "Palazzo del Monte di Piet\u00e0", "type": "museum", "dist": 31, "label": "Museo", "emoji": "\ud83c\udfdb\ufe0f", "color": "#9B59B6", "wiki": "", "web": "https://www.palazzodelmontepadova.com", "desc": "Orari: Mo-Fr 09:30-18:30; Sa 09:30-13:30 \u00b7 Biglietto: yes", "phone": "+39 049 8234882", "hours": "Mo-Fr 09:30-18:30; Sa 09:30-13:30"}, {"lat": 45.406805, "lon": 11.8717946, "name": "Battistero", "type": "attraction", "dist": 71, "label": "Attrazione", "emoji": "\u2b50", "color": "#2196F3", "wiki": "it:Battistero di Padova", "web": "", "desc": "Il battistero della Cattedrale, dedicato a san Giovanni Battista, \u00e8 un edificio di culto ubicato accanto al Duomo, a Padova. Conserva al suo interno uno dei pi\u00f9 importanti cicli ad affresco del XIV secolo, capolavoro di Giusto de Menabuoi. Dal 2021 \u00e8 incluso dall'UNESCO tra i patrimoni dell'umanit\u00e0 nel sito dei cicli di affreschi del XIV secolo di Padova.", "phone": "", "hours": ""}, {"lat": 45.406438, "lon": 11.8720871, "name": "Museo Diocesano", "type": "museum", "dist": 33, "label": "Museo", "emoji": "\ud83c\udfdb\ufe0f", "color": "#9B59B6", "wiki": "", "web": "", "desc": "Biglietto: gratuito", "phone": "", "hours": ""}, {"lat": 45.4057628, "lon": 11.8731299, "name": "Museo dell'Educazione", "type": "museum", "dist": 70, "label": "Museo", "emoji": "\ud83c\udfdb\ufe0f", "color": "#9B59B6", "wiki": "it:Museo dell'Educazione", "web": "", "desc": "Il Museo dell'Educazione dell'Universit\u00e0 degli Studi di Padova ha sede presso il Dipartimento di Filosofia, Sociologia, Pedagogia e Psicologia Applicata FISPPA e conserva materiale del passato relativo alla formazione dell'individuo, a partire dalla nascita fino ad arrivare all'et\u00e0 adulta.", "phone": "", "hours": ""}, {"lat": 45.4049932, "lon": 11.8731198, "name": "Palazzo Papafava dei Carraresi", "type": "historic", "dist": 123, "label": "Sito storico", "emoji": "\ud83c\udff0", "color": "#795548", "wiki": "", "web": "", "desc": "Castle", "phone": "", "hours": ""}, {"lat": 45.4020295, "lon": 11.8685594, "name": "Museo di Astronomia", "type": "museum", "dist": 479, "label": "Museo", "emoji": "\ud83c\udfdb\ufe0f", "color": "#9B59B6", "wiki": "", "web": "https://www.oapd.inaf.it", "desc": "Orari: Oct-May Th 17:30+; Jun-Sep Sa-Su 18:00+ \u00b7 Biglietto: yes", "phone": "", "hours": "Oct-May Th 17:30+; Jun-Sep Sa-Su 18:00+"}, {"lat": 45.4019143, "lon": 11.8685699, "name": "La Specola", "type": "attraction", "dist": 490, "label": "Attrazione", "emoji": "\u2b50", "color": "#2196F3", "wiki": "it:Specola di Padova", "web": "", "desc": "La Specola di Padova \u00e8 la sede dell'Osservatorio Astronomico di Padova, una delle pi\u00f9 importanti strutture di ricerca dell'Istituto Nazionale di Astrofisica (INAF). Nato come gabinetto universitario nel 1767, l'Osservatorio divenne ente giuridico autonomo nel 1923, per confluire infine nell'INAF nel 2001. La Specola fu realizzata trasformando e riadattando interamente la torre principale del Castelvecchio, la cosiddetta Torlonga. \u00c8 alta 49,59\u00a0m per 252 gradini.", "phone": "", "hours": ""}, {"lat": 45.4023602, "lon": 11.8693219, "name": "Castello Carrarese", "type": "historic", "dist": 421, "label": "Sito storico", "emoji": "\ud83c\udff0", "color": "#795548", "wiki": "it:Castelvecchio (Padova)", "web": "", "desc": "Il Castelvecchio, anticamente definito Castello della Torlonga ma oggi conosciuto anche come Castello di Ezzelino, o Castello Carrarese o ancora Castello di Padova, \u00e8 una fortificazione di origine altomedievale posta sulla biforcazione del Bacchiglione dove si divide in Tronco Maestro e Naviglio interno. Deve le attuali caratteristiche alla signoria dei Da Carrara. Durante il XIX secolo e il XX secolo venne in gran parte utilizzato come prigione statale mentre il mastio, la Torlonga, \u00e8 dal XVIII secolo la Specola cittadina.", "phone": "", "hours": ""}, {"lat": 45.4076312, "lon": 11.8692899, "name": "Ruderi del \"Traghetto delle Mura\"", "type": "historic", "dist": 197, "label": "Sito storico", "emoji": "\ud83c\udff0", "color": "#795548", "wiki": "", "web": "", "desc": "Ruins", "phone": "", "hours": ""}, {"lat": 45.4115266, "lon": 11.8643653, "name": "Bastione Savonarola", "type": "attraction", "dist": 777, "label": "Attrazione", "emoji": "\u2b50", "color": "#2196F3", "wiki": "", "web": "", "desc": "", "phone": "", "hours": ""}, {"lat": 45.4077229, "lon": 11.8639469, "name": "Bastione San Prosdocimo", "type": "attraction", "dist": 570, "label": "Attrazione", "emoji": "\u2b50", "color": "#2196F3", "wiki": "", "web": "", "desc": "", "phone": "", "hours": ""}, {"lat": 45.4037251, "lon": 11.8639483, "name": "Bastione San Giovanni", "type": "attraction", "dist": 617, "lab :45-19:30"}, {"lat": 45.4071754, "lon": 11.8766055, "name": "Palazzo Moroni", "type": "attraction", "dist": 5, "label": "Attrazione", "emoji": "\u2b50", "color": "#2196F3", "wiki": "", "web": "", "desc": "", "phone": "", "hours": ""}, {"lat": 45.406726, "lon": 11.877418, "name": "Palazzo del Bo", "type": "komoot", "dist": 0, "label": "Komoot", "emoji": "\ud83d\udeb4", "color": "#6AA84F", "wiki": "it:Palazzo del Bo", "web": "", "desc": "Il Palazzo del Bo \u00e8 la storica sede dell'Universit\u00e0 degli Studi di Padova dal 1493. Tuttora \u00e8 sede del rettorato e della Scuola di Giurisprudenza, nonch\u00e9 del Teatro anatomico pi\u00f9 antico del mondo.", "phone": "", "hours": ""}, {"lat": 45.4062254, "lon": 11.8775498, "name": "Ponte San Lorenzo", "type": "historic", "dist": 22, "label": "Sito storico", "emoji": "\ud83c\udff0", "color": "#795548", "wiki": "en:Ponte San Lorenzo", "web": "", "desc": "The Ponte San Lorenzo is a Roman bridge over the river Bacchiglione in Padua, Italy. Constructed between 47 and 30\u00a0BC, it is one of the very earliest segmental arched bridges in the world. It is also notable for the slenderness of its piers, unsurpassed in antiquity.", "phone": "", "hours": ""}, {"lat": 45.4056547, "lon": 11.879923, "name": "Palazzo Roccabonella", "type": "attraction", "dist": 59, "label": "Attrazione", "emoji": "\u2b50", "color": "#2196F3", "wiki": "", "web": "", "desc": "", "phone": "", "hours": ""}, {"lat": 45.4060178, "lon": 11.8793372, "name": "Palazzo Zabarella", "type": "museum", "dist": 18, "label": "Museo", "emoji": "\ud83c\udfdb\ufe0f", "color": "#9B59B6", "wiki": "it:Palazzo Zabarella", "web": "", "desc": "Palazzo Zabarella \u00e8 uno storico palazzo padovano. Si trova nel centro storico della citt\u00e0, in via S. Francesco, 27.", "phone": "", "hours": ""}, {"lat": 45.4052181, "lon": 11.8803368, "name": "Museo di Storia della Medicina in Padova (MUSME)", "type": "museum", "dist": 88, "label": "Museo", "emoji": "\ud83c\udfdb\ufe0f", "color": "#9B59B6", "wiki": "it:MUSME", "web": "http://www.musme.padova.it/", "desc": "Il Museo di storia della medicina di Padova (MUSME) \u00e8 un museo aperto al pubblico dal 2015 e situato all'interno dell'antico Ospedale di San Francesco Grande, a fianco della chiesa di San Francesco Grande a Padova. Il museo, attraverso i suoi strumenti interattivi e le sue collezioni, illustra al pubblico di ogni et\u00e0 e istruzione l'evoluzione della scienza medica nel corso dei secoli, con particolare riferimento alla storia della medicina nell'universit\u00e0 di Padova, una delle pi\u00f9 importanti scuole mediche in Occidente.", "phone": "", "hours": ""}, {"lat": 45.4049804, "lon": 11.8791485, "name": "Museo di Geografia", "type": "museum", "dist": 27, "label": "Museo", "emoji": "\ud83c\udfdb\ufe0f", "color": "#9B59B6", "wiki": "", "web": "https://www.musei.unipd.it/geografia", "desc": "The Museum of Geography is located at the first floor of the Wollemborg Palace, seat of the DiSSGeA Section of Geography. While The Museum spaces are currently under preparation.", "phone": "+39 0498274276", "hours": "Mo,We-Sa off; Tu 15:00-18:00; Su 14:30-18:30"}, {"lat": 45.4050308, "lon": 11.881054, "name": "Scuola della Carit\u00e0", "type": "attraction", "dist": 143, "label": "Attrazione", "emoji": "\u2b50", "color": "#2196F3", "wiki": "it:Scuola della Carit\u00e0 (Padova)", "web": "", "desc": "La Scuola della Carit\u00e0 di Padova \u00e8 un edificio di origine medievale che dai primi decenni del Quattrocento fu la sede della Confraternita della Carit\u00e0, congregazione di carattere laico dedicata ad attivit\u00e0 devozionali e assistenziali, fino agli inizi dell'Ottocento. Il complesso \u00e8 utilizzato per attivit\u00e0 culturali.", "phone": "", "hours": ""}, {"lat": 45.402195, "lon": 11.8795846, "name": "Palazzo Tolomei", "type": "attraction", "dist": 39, "label": "Attrazione", "emoji": "\u2b50", "color": "#2196F3", "wiki": "", "web": "", "desc": "", "phone": "", "hours": ""}, {"lat : "", "hours": ""}, {"lat": 45.403392, "lon": 11.875609, "name": "Canale Naviglio Interno", "type": "komoot", "dist": 0, "label": "Komoot", "emoji": "\ud83d\udeb4", "color": "#6AA84F", "wiki": "it:Naviglio Interno", "web": "", "desc": "Il Naviglio Interno era un antico canale di Padova che percorreva la zona orientale del centro storico. Negli anni 1950 \u00e8 stato quasi completamente tombinato.", "phone": "", "hours": ""}, {"lat": 45.4045792, "lon": 11.8756493, "name": "Chiesa di Santa Maria dei Servi", "type": "attraction", "dist": 26, "label": "Attrazione", "emoji": "\u2b50", "color": "#2196F3", "wiki": "it:Chiesa di Santa Maria dei Servi (Padova)", "web": "", "desc": "La chiesa della Nativit\u00e0 della Beata Vergine Maria ai Servi conosciuta come Santa Maria dei Servi o Servi \u00e8 un edificio religioso trecentesco che si affaccia sulla via Roma a Padova. Gi\u00e0 dei Servi di Maria, \u00e8 attualmente chiesa parrocchiale nel vicariato del Basilica Cattedrale di Santa Maria Assunta retta dall'Ordine dei Servi di Maria. Le chiese di San Canziano e San Luca sono sue sussidiarie. Per un periodo le furono sussidiarie anche le scomparse chiese di San Zilio e di Santa Giuliana. La chiesa conserva opere d'arte insigni tra cui il Crocifisso ligneo opera di Donatello.", "phone": "", "hours": ""}, {"lat": 45.405051, "lon": 11.8762226, "name": "Sala Samon\u00e0", "type": "gallery", "dist": 4, "label": "Galleria d'arte", "emoji": "\ud83d\uddbc\ufe0f", "color": "#F44336", "wiki": "", "web": "", "desc": "", "phone": "", "hours": ""}, {"lat": 45.4060426, "lon": 11.8759223, "name": "Museo della Padova Ebraica", "type": "museum", "dist": 55, "label": "Museo", "emoji": "\ud83c\udfdb\ufe0f", "color": "#9B59B6", "wiki": "", "web": "http://www.museopadovaebraica.it/", "desc": "Gaat over het Joodse erfgoed van de stad", "phone": "049661267", "hours": "Mo, Th 10:00-17:00; Su 10:00-18:00"}, {"lat": 45.406898, "lon": 11.875959, "name": "Palazzo della Ragione e il Mercato di Piazza delle Erbe, Padova", "type": "komoot", "dist": 0, "label": "Komoot", "emoji": "\ud83d\udeb4", "color": "#6AA84F", "wiki": "it:Palazzo della Ragione (Padova)", "web": "https://padovacultura.padovanet.it/it/musei/palazzo-della-ragione", "desc": "Il Palazzo della Ragione era l'antica sede dei tribunali cittadini e del mercato coperto di Padova. La parte inferiore era gi\u00e0 esistente nel 1166, ma si stima che sia stato eretto tra il 1218 e il 1219, e tra il 1306 e il 1309 Giovanni degli Eremitani fece aggiungere il porticato e le logge e fece innalzare la copertura a cui diede la caratteristica forma di carena di nave rovesciata. Il piano superiore \u00e8 occupato da quella che \u00e8 stata la pi\u00f9 grande sala pensile del mondo, detta \"Salone\", che misura circa 80 metri per 27 e ha un'altezza di quasi 40 metri, con soffitto ligneo a carena di nave. Il piano inferiore ospita invece lo storico mercato coperto della citt\u00e0. Il palazzo fa parte dei musei civici di Padova. Grazie agli affreschi presenti nel Salone, realizzati in origine da Giotto e rifatti dopo l'incendio del 1420, nel 2021 \u00e8 stato incluso dall'UNESCO tra i patrimoni dell'umanit\u00e0 nel sito dei cicli di affreschi del XIV secolo di Padova.", "phone": "", "hours": ""}];

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>

(function() {
  var TRACK = window.APP_TRACK;
  var POIS  = window.APP_POIS;
  var TYPES     = window.APP_TYPES;
  var NAV_URL   = window.NAV_URL;
  var NAV_LABEL = window.NAV_LABEL;
  var mapEl       = document.getElementById('map');

  var map = L.map("map", {zoomControl: true});

  L.polyline(TRACK, {color: "#e94560", weight: 3, opacity: 0.85}).addTo(map);

  var markers = [];
  var active  = {};
  Object.keys(TYPES).forEach(function(t) { active[t] = true; });

  var _o = "<", _c = ">";  // prevent HTML parser from seeing tags in script

  function makeIcon(type) {
    var c = TYPES[type] || TYPES["attraction"];
    var inner;
    if (type === "komoot") {
      inner = _o + "svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' width='14' height='14' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'" + _c
            + _o + "circle cx='5.5' cy='17.5' r='3.5'/" + _c + _o + "circle cx='18.5' cy='17.5' r='3.5'/" + _c
            + _o + "path d='M15 6h-5l-2 6h9l-2-6z'/" + _c + _o + "line x1='5.5' y1='17.5' x2='10' y2='6'/" + _c
            + _o + "/svg" + _c;
    } else {
      inner = _o + "span style='font-size:13px;line-height:26px'" + _c + c.emoji + _o + "/span" + _c;
    }
    return L.divIcon({
      html: _o + "div style='background:" + c.color + ";width:26px;height:26px;"
          + "border-radius:50%;display:flex;align-items:center;justify-content:center;"
          + "border:2px solid white;box-shadow:0 2px 5px rgba(0,0,0,0.35)'" + _c
          + inner + _o + "/div" + _c,
      iconSize:   [26, 26],
      iconAnchor: [13, 13],
      className:  ""
    });
  }

  function makePopupHTML(p) {
    var s = _o + "b" + _c + p.emoji + " " + p.name + _o + "/b" + _c
          + _o + "br" + _c + _o + "small style='color:#555'" + _c + p.label + _o + "/small" + _c;
    if (p.dist > 0) {
      s += _o + "br" + _c + _o + "small style='color:#2a9d8f'" + _c + p.dist + " m dal percorso" + _o + "/small" + _c;
    }
    if (p.hours) {
      s += _o + "br" + _c + _o + "small style='color:#888'" + _c + "🕐 " + p.hours + _o + "/small" + _c;
    }
    if (p.phone) {
      s += _o + "br" + _c + _o + "a href='tel:" + p.phone + "' style='font-size:0.8em'" + _c + "📞 " + p.phone + _o + "/a" + _c;
    }
    if (p.wiki) {
      var wparts = p.wiki.indexOf(":") !== -1 ? p.wiki.split(":") : ["it", p.wiki];
      var wlang = wparts[0], wtitle = wparts.slice(1).join(":");
      s += _o + "br" + _c + _o + "a href='https://" + wlang + ".wikipedia.org/wiki/" + encodeURIComponent(wtitle)
        +  "' target='_blank' style='font-size:0.8em'" + _c + "Wikipedia" + _o + "/a" + _c;
    }
    if (p.web) {
      s += _o + "br" + _c + _o + "a href='" + p.web + "' target='_blank' style='font-size:0.8em'" + _c + "Sito web" + _o + "/a" + _c;
    }
    return s;
  }

  var selectedRow    = null;
  var selectedMarker = null;

  function deselectPOI() {
    if (selectedRow)    { selectedRow.classList.remove("selected"); selectedRow = null; }
    if (selectedMarker) { selectedMarker.closePopup(); selectedMarker = null; }
  }

  function selectPOI(row, m, p) {
    if (selectedRow) selectedRow.classList.remove("selected");
    selectedRow    = row;
    selectedMarker = m;
    row.classList.add("selected");
    row.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }

  function render() {
    markers.forEach(function(m) { m.remove(); });
    markers = [];
    selectedRow = null;
    var list    = document.getElementById("list");
    var counter = document.getElementById("vis-count");
    list.innerHTML = "";
    var q = searchQuery.trim().toLowerCase();
    var visible = [];
    for (var i = 0; i < POIS.length; i++) {
      if (!active[POIS[i].type]) continue;
      if (nearFilter !== null) {
        var d = geoDistM(POIS[i].lat, POIS[i].lon, nearFilter.lat, nearFilter.lon);
        if (d > NEAR_M) continue;
      }
      if (q && POIS[i].name.toLowerCase().indexOf(q) === -1) continue;
      if (webOnly && !POIS[i].wiki && !POIS[i].web) continue;
      visible.push(POIS[i]);
    }
    counter.textContent = visible.length;

    // Update type filter buttons: show only types present after text+near filter
    var typesInSearch = {};
    Object.keys(TYPES).forEach(function(t) { typesInSearch[t] = false; });
    for (var k = 0; k < POIS.length; k++) {
      var p0 = POIS[k];
      if (nearFilter !== null) {
        var d0 = geoDistM(p0.lat, p0.lon, nearFilter.lat, nearFilter.lon);
        if (d0 > NEAR_M) continue;
      }
      if (q && p0.name.toLowerCase().indexOf(q) === -1) continue;
      if (webOnly && !p0.wiki && !p0.web) continue;
      typesInSearch[p0.type] = true;
    }
    var filterBtns = document.querySelectorAll(".fbtn");
    filterBtns.forEach(function(btn) {
      var t = btn.getAttribute("data-type");
      if (t) {
        if (typesInSearch[t]) {
          btn.classList.remove("hidden");
        } else {
          btn.classList.add("hidden");
        }
      }
    });
    updateAllNoneBtn();
    for (var j = 0; j < visible.length; j++) {
      (function(p) {
        var m = L.marker([p.lat, p.lon], {icon: makeIcon(p.type)})
                  .bindPopup(makePopupHTML(p))
                  .addTo(map);
        markers.push(m);

        var row  = document.createElement("div");  row.className  = "item";
        var ico  = document.createElement("div");  ico.className  = "ico";
        var body = document.createElement("div");  body.style.flex = "1"; body.style.minWidth = "0";
        var nm   = document.createElement("div");  nm.className   = "iname";
        var mt   = document.createElement("div");  mt.className   = "imeta";
        var ds   = document.createElement("div");  ds.className   = "idist";
        var dc   = document.createElement("div");  dc.className   = "idesc";

        var nav  = document.createElement("a");
        nav.className = "inav";
        nav.href   = NAV_URL(p);
        nav.target = "_blank";
        nav.title  = NAV_LABEL;
        nav.innerHTML = "&#x27A1;";
        nav.addEventListener("click", function(e) { e.stopPropagation(); });

        ico.textContent = p.emoji;
        nm.textContent  = p.name;
        mt.textContent  = p.label;
        if (p.dist > 0) ds.textContent = p.dist + " m dal percorso";
        if (p.desc) dc.textContent = p.desc;
        body.appendChild(nm); body.appendChild(mt); body.appendChild(ds);
        if (p.desc) body.appendChild(dc);
        if (p.hours) {
          var hr = document.createElement("div");
          hr.className = "ihours";
          hr.textContent = "🕐 " + p.hours;
          body.appendChild(hr);
        }
        if (p.phone) {
          var ph = document.createElement("a");
          ph.className = "iphone";
          ph.href = "tel:" + p.phone;
          ph.textContent = "📞 " + p.phone;
          ph.addEventListener("click", function(e) { e.stopPropagation(); });
          body.appendChild(ph);
        }
        if (p.wiki) {
          var wparts = p.wiki.indexOf(":") !== -1 ? p.wiki.split(":") : ["it", p.wiki];
          var wlang = wparts[0], wtitle = wparts.slice(1).join(":");
          var wlink = document.createElement("a");
          wlink.className = "iwiki";
          wlink.href = "https://" + wlang + ".wikipedia.org/wiki/" + encodeURIComponent(wtitle);
          wlink.target = "_blank";
          wlink.textContent = "Wikipedia";
          wlink.addEventListener("click", function(e) { e.stopPropagation(); });
          body.appendChild(wlink);
        }
        if (p.web) {
          var wblink = document.createElement("a");
          wblink.className = "iwiki";
          wblink.href = p.web;
          wblink.target = "_blank";
          wblink.textContent = "Sito web";
          wblink.addEventListener("click", function(e) { e.stopPropagation(); });
          body.appendChild(wblink);
        }
        row.appendChild(ico); row.appendChild(body); row.appendChild(nav);

        m.on("click", function() {
          if (selectedRow === row) {
            deselectPOI();
          } else {
            selectPOI(row, m, p);
          }
        });

        row.addEventListener("click", function() {
          if (selectedRow === row) {
            deselectPOI();
          } else {
            selectPOI(row, m, p);
            map.setView([p.lat, p.lon], 16);
            m.openPopup();
          }
        });
        list.appendChild(row);
      })(visible[j]);
    }
  }

  var filterDiv = document.getElementById("filters");

  // All / None button
  var allNoneBtn = document.createElement("button");
  allNoneBtn.className = "fbtn fbtn-allnone";
  allNoneBtn.textContent = "None";
  allNoneBtn.addEventListener("click", function() {
    var visibleTypes = getVisibleTypes();
    var allActive = visibleTypes.every(function(t) { return active[t]; });
    visibleTypes.forEach(function(t) {
      active[t] = !allActive;
      var b = filterDiv.querySelector(".fbtn[data-type='" + t + "']");
      if (b) {
        b.style.background = active[t] ? TYPES[t].color : "transparent";
        b.style.color      = active[t] ? "#111" : "#eee";
      }
    });
    render();
  });
  filterDiv.appendChild(allNoneBtn);

  function getVisibleTypes() {
    var result = [];
    filterDiv.querySelectorAll(".fbtn[data-type]").forEach(function(b) {
      if (!b.classList.contains("hidden")) result.push(b.getAttribute("data-type"));
    });
    return result;
  }

  function updateAllNoneBtn() {
    var visibleTypes = getVisibleTypes();
    var allActive = visibleTypes.length > 0 && visibleTypes.every(function(t) { return active[t]; });
    allNoneBtn.textContent = allActive ? "None" : "All";
  }

  Object.keys(TYPES).forEach(function(type) {
    var cfg = TYPES[type];
    var btn = document.createElement("button");
    btn.className            = "fbtn";
    btn.setAttribute("data-type", type);
    btn.style.borderColor    = cfg.color;
    btn.style.background     = cfg.color;
    btn.style.color          = "#111";
    btn.textContent          = cfg.emoji + " " + cfg.label;
    btn.addEventListener("click", function() {
      active[type]         = !active[type];
      btn.style.background = active[type] ? cfg.color : "transparent";
      btn.style.color      = active[type] ? "#111"    : "#eee";
      render();
    });
    filterDiv.appendChild(btn);
  });

  render();

  // Zoom iniziale: adatta la mappa a tutti i POI visibili (o alla traccia)
  (function() {
    var latlngs = markers.map(function(m) { return m.getLatLng(); });
    if (latlngs.length === 0) {
      latlngs = TRACK.map(function(p) { return L.latLng(p[0], p[1]); });
    }
    if (latlngs.length === 1) {
      map.setView(latlngs[0], 14);
    } else if (latlngs.length > 1) {
      map.fitBounds(L.latLngBounds(latlngs), {padding: [30, 30]});
    }
  })();

  // Find — text search toggle
  var findBtn    = document.getElementById("find-btn");
  var searchBar  = document.getElementById("search-bar");
  var searchInput = document.getElementById("search-input");
  var findActive = false;

  findBtn.addEventListener("click", function() {
    findActive = !findActive;
    if (findActive) {
      findBtn.classList.add("active");
      searchBar.classList.add("open");
      searchInput.focus();
    } else {
      findBtn.classList.remove("active");
      searchBar.classList.remove("open");
      searchQuery = "";
      searchInput.value = "";
      if (foodActive) {
        renderFoodSection(foodElements);
      } else {
        render();
      }
    }
  });

  searchInput.addEventListener("input", function() {
    searchQuery = searchInput.value;
    if (foodActive) {
      renderFoodSection(foodElements);
    } else {
      render();
    }
  });

  // Web — filter POIs with Wikipedia or website link
  var webBtn = document.getElementById("web-btn");
  webBtn.addEventListener("click", function() {
    webOnly = !webOnly;
    if (webOnly) {
      webBtn.classList.add("active");
    } else {
      webBtn.classList.remove("active");
    }
    render();
  });

  // Near — geolocation + proximity filter
  var locationMarker  = null;
  var locationCircle  = null;
  var locationWatcher = null;

  function geoDistM(lat1, lon1, lat2, lon2) {
    var R = 6371000;
    var dLat = (lat2 - lat1) * Math.PI / 180;
    var dLon = (lon2 - lon1) * Math.PI / 180;
    var a = Math.sin(dLat/2)*Math.sin(dLat/2)
          + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)
          * Math.sin(dLon/2)*Math.sin(dLon/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function updateLocationMarker(latlng, accuracy) {
    if (locationMarker) {
      locationMarker.setLatLng(latlng);
      locationCircle.setLatLng(latlng).setRadius(accuracy);
    } else {
      locationCircle = L.circle(latlng, {
        radius: accuracy, color: "#4ecca3", fillColor: "#4ecca3",
        fillOpacity: 0.15, weight: 1
      }).addTo(map);
      locationMarker = L.circleMarker(latlng, {
        radius: 7, color: "white", weight: 2,
        fillColor: "#4ecca3", fillOpacity: 1
      }).addTo(map);
    }
  }

  function applyNearFilter(lat, lon, panMap) {

  function renderFoodSection(elements) {
    // Salva sempre gli elementi originali (non filtrati) per ri-filtrare
    if (elements !== foodElements) foodElements = elements;

    var old = document.getElementById("food-section");
    if (old) old.remove();
    var searching = document.getElementById("food-searching");
    if (searching) searching.remove();

    // Applica filtro testo su nome, tipo e cucina
    var q = searchQuery.trim().toLowerCase();
    var filtered = q ? elements.filter(function(el) {
      var tags = el.tags || {};
      var name    = (tags.name    || "").toLowerCase();
      var cuisine = (tags.cuisine || "").toLowerCase();
      var cat     = foodCatInfo(tags);
      var label   = cat.label.toLowerCase();
      return name.indexOf(q) !== -1 || label.indexOf(q) !== -1 || cuisine.indexOf(q) !== -1;
    }) : elements;

    var sec = document.createElement("div");
    sec.id = "food-section";

    var hdr = document.createElement("div");
    hdr.className = "food-hdr";

    hdr.textContent = "🍽️ " + radiusLabel + " (" + filtered.length + (q ? "/" + elements.length : "") + ")";
    sec.appendChild(hdr);

    if (filtered.length === 0) {
      var empty = document.createElement("div");
      empty.className = "food-empty";
      empty.textContent = q ? 'Nessun risultato per "' + q + '"' : "Nessun locale trovato entro " + foodRadiusUsed + " m";
      sec.appendChild(empty);

      // Rimuovi marker precedenti
      foodMarkers.forEach(function(m) { m.remove(); });
      foodMarkers = [];
      return;

    foodMarkers = [];

    filtered.forEach(function(el) {

      var cat  = foodCatInfo(tags);

      var lat  = el.lat || (el.center && el.center.lat);

  function buildOverpassQuery(lat, lon, r) {
    return '[out:json][timeout:15];'
         + '('
         + 'node[amenity~"^(restaurant|bar|cafe|fast_food)$"](around:' + r + ',' + lat + ',' + lon + ');'
         + 'node[shop~"^(supermarket|convenience|bakery)$"](around:'  + r + ',' + lat + ',' + lon + ');'
         + 'way[amenity~"^(restaurant|bar|cafe|fast_food)$"](around:'  + r + ',' + lat + ',' + lon + ');'
         + 'way[shop~"^(supermarket|convenience|bakery)$"](around:'    + r + ',' + lat + ',' + lon + ');'
         + ');'
         + 'out center tags;';
  }

  function processOverpassResult(data, lat, lon) {
    var els = (data.elements || []).filter(function(e) {
      return e.tags && e.tags.name;
    });
    els.sort(function(a, b) {
      var aLat = a.lat||(a.center&&a.center.lat)||lat;
      var aLon = a.lon||(a.center&&a.center.lon)||lon;
      var bLat = b.lat||(b.center&&b.center.lat)||lat;
      var bLon = b.lon||(b.center&&b.center.lon)||lon;
      return geoDistM(lat,lon,aLat,aLon) - geoDistM(lat,lon,bLat,bLon);
    });
    return els;
  }

    })
    .catch(function() {
      foodBtn.innerHTML = "<span class='btn-ico'><svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 53.6621 95.2637' width='18' height='18' fill='currentColor'><path d='M13.4521 89.3555C16.7724 89.3555 18.7256 87.5 18.6767 84.3262L17.9443 41.2109C17.9443 39.8438 18.5791 38.8184 19.751 38.2812C24.8291 36.084 27.1728 33.7891 26.8799 27.002L25.8056 3.27148C25.708 1.5625 24.7314 0.537109 23.1201 0.537109C21.5576 0.537109 20.6299 1.61133 20.6299 3.32031L20.9228 26.416C20.9228 27.7344 20.0439 28.6133 18.7256 28.6133C17.4072 28.6133 16.4795 27.7832 16.4795 26.5137L16.0888 2.63672C16.04 0.976562 15.0635 0 13.4521 0C11.8896 0 10.9131 0.976562 10.8642 2.63672L10.4736 26.5137C10.4736 27.7832 9.54587 28.6133 8.17869 28.6133C6.90915 28.6133 6.03025 27.7344 6.03025 26.416L6.27439 3.32031C6.27439 1.61133 5.39548 0.537109 3.83298 0.537109C2.22165 0.537109 1.19626 1.5625 1.09861 3.27148L0.024389 27.002C-0.26858 33.7891 2.07517 36.084 7.20212 38.2812C8.374 38.8184 9.00876 39.8438 9.00876 41.2109L8.27634 84.3262C8.22751 87.5 10.1806 89.3555 13.4521 89.3555ZM43.9209 55.2246L43.1885 84.2773C43.0908 87.5 45.0927 89.3555 48.3642 89.3555C51.6845 89.3555 53.6377 87.6953 53.6377 84.6191L53.6377 2.97852C53.6377 0.927734 52.2217 0 50.7568 0C49.292 0 48.3154 0.78125 46.9482 2.68555C40.7959 11.377 36.6455 27.8809 36.6455 42.9688L36.6455 44.6289C36.6455 47.168 37.6709 49.1699 39.5752 50.4395L42.0166 52.0508C43.3349 52.9785 43.9697 54.0039 43.9209 55.2246Z'/></svg></span><span class='btn-lbl'>Food</span>";
      foodBtn.disabled = false;
      foodActive = false;
      foodBtn.classList.remove("active");
      clearFood();
      exitFoodMode();
      alert("Ricerca locali non disponibile. Controlla la connessione.");
    });
  }

  foodBtn.addEventListener("click", function() {
    if (foodActive) {
      foodActive = false;
      foodBtn.classList.remove("active");
      clearFood();
      exitFoodMode();
      return;
    }
    if (!navigator.geolocation) {
      alert("Geolocalizzazione non supportata da questo browser.");
      return;
    }
    navigator.geolocation.getCurrentPosition(
      function(pos) {
        foodLat = pos.coords.latitude;
        foodLon = pos.coords.longitude;
        foodActive = true;
        foodBtn.classList.add("active");
        updateLocationMarker(L.latLng(foodLat, foodLon), pos.coords.accuracy);
        // Riusa cache se posizione entro FOOD_RADIUS/5 dalla query precedente
        var reuse = foodQueryLat !== null && foodElements.length > 0
                 && geoDistM(foodLat, foodLon, foodQueryLat, foodQueryLon) <= FOOD_RADIUS / 5;
        if (reuse) {
          enterFoodMode();
          renderFoodSection(foodElements);
        } else {
          foodRadiusUsed = FOOD_RADIUS;
          enterFoodMode();
          queryFood(foodLat, foodLon);
        }
      },
      function(err) {
        var errCodes = {1:"Permesso negato", 2:"Posizione non disponibile", 3:"Timeout"};
        alert("Errore geolocalizzazione: " + (errCodes[err.code] || err.message));
      },
      { enableHighAccuracy: true, timeout: 10000 }
    );
  });

  // Map toggle (mobile only)
  var toggleBtn = document.getElementById('map-toggle');
  var mapVisible = true;
  toggleBtn.classList.add('active');
  toggleBtn.addEventListener('click', function() {
    mapVisible = !mapVisible;
    if (mapVisible) {
      mapEl.classList.remove('collapsed');
      toggleBtn.classList.add('active');
      setTimeout(function() {
        map.invalidateSize();
        if (selectedRow) selectedRow.scrollIntoView({ behavior: "smooth", block: "nearest" });
      }, 310);
    } else {
      mapEl.classList.add('collapsed');
      toggleBtn.classList.remove('active');
    }
  });
})();

</script>
