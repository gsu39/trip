<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BICIAMICI</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #f7f4ef;
      --warm-white: #fdfcfa;
      --ink: #1c1c1c;
      --muted: #8a8480;
      --accent: #c8a96e;
      --border: rgba(28,28,28,0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background-color: var(--cream);
      font-family: 'Montserrat', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* Subtle grain texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 56px;
      animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) both;
    }

    .eyebrow {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
    }

    .title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.8rem, 9vw, 4.2rem);
      font-weight: 300;
      letter-spacing: 0.12em;
      color: var(--ink);
      line-height: 1;
    }

    .title-rule {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 18px 0;
    }
    .title-rule span {
      flex: 1;
      height: 1px;
      background: var(--accent);
      opacity: 0.5;
    }
    .title-rule .icon {
      font-size: 1rem;
      color: var(--accent);
      opacity: 0.6;
    }

    .subtitle {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Buttons */
    .buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }

    .trip-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 32px;
      background: var(--warm-white);
      border: 1px solid var(--border);
      border-radius: 4px;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.25s ease,
                  border-color 0.25s ease,
                  transform 0.25s cubic-bezier(0.34,1.56,0.64,1),
                  box-shadow 0.25s ease;
      animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) both;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }

    .trip-btn:nth-child(1) { animation-delay: 0.15s; }
    .trip-btn:nth-child(2) { animation-delay: 0.25s; }
    .trip-btn:nth-child(3) { animation-delay: 0.35s; }
    .trip-btn:nth-child(4) { animation-delay: 0.45s; }

    .trip-btn:hover {
      background: #fff;
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.08);
    }

    .btn-left {
      display: flex;
      align-items: baseline;
      gap: 16px;
    }

    .btn-number {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 300;
      color: var(--accent);
      line-height: 1;
      min-width: 24px;
    }

    .btn-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--ink);
    }

    .btn-arrow {
      font-size: 0.9rem;
      color: var(--accent);
      opacity: 0;
      transform: translateX(-8px);
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .trip-btn:hover .btn-arrow {
      opacity: 1;
      transform: translateX(0);
    }

    /* Footer */
    .footer {
      margin-top: 48px;
      text-align: center;
      animation: fadeUp 0.9s 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }
    .footer p {
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.6;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="container">

    <header class="header">
      <p class="eyebrow">Racconti di pedalate</p>
      <h1 class="title">BICIAMICI</h1>
      <div class="title-rule">
        <span></span>
        <span class="icon">⊹</span>
        <span></span>
      </div>
      <p class="subtitle">I nostri viaggi</p>
    </header>

    <nav class="buttons">
      <a class="trip-btn" href="Puglia_Matera_poi.html">
        <div class="btn-left">
          <span class="btn-number">01</span>
          <span class="btn-label">Puglia</span>
        </div>
        <span class="btn-arrow">→</span>
      </a>

      <a class="trip-btn" href="Anello_parchi_lucani_poi.html">
        <div class="btn-left">
          <span class="btn-number">02</span>
          <span class="btn-label">Anello dei Parchi Lucani</span>
        </div>
        <span class="btn-arrow">→</span>
      </a>

      <a class="trip-btn" href="Connemara_Burren_poi.html">
        <div class="btn-left">
          <span class="btn-number">03</span>
          <span class="btn-label">Connemara &amp; Burren</span>
        </div>
        <span class="btn-arrow">→</span>
      </a>

      <a class="trip-btn" href="Killarney_Beara_poi.html">
        <div class="btn-left">
          <span class="btn-number">04</span>
          <span class="btn-label">Killarney &amp; Beara Way</span>
        </div>
        <span class="btn-arrow">→</span>
      </a>
    </nav>

    <footer class="footer">
      <p>Seleziona un viaggio per aprirlo</p>
    </footer>

  </div>

</body>
</html>
